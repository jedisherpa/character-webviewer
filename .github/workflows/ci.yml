name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      # Assets are committed under public/; sync no-ops if sources are absent.
      - run: npm run build
        env:
          VITE_LIVE_API_BASE: ${{ vars.VITE_LIVE_API_BASE }}
